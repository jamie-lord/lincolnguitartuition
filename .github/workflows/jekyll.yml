name: Build & deploy Jekyll site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - id: pages
        uses: actions/configure-pages@v5

      - name: Write dynamic config (so preview & prod both build)
        run: |
          cat > _config.pages.yml <<EOF
          url: "${{ steps.pages.outputs.origin }}"
          baseurl: "${{ steps.pages.outputs.base_path }}"
          EOF

      - name: Build Jekyll
        run: |
          bundle exec jekyll build --config "_config.yml,_config.pages.yml"
        env:
          JEKYLL_ENV: production

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
