{% assign c = site.data.contact %}
<div class="contact-row">
  <div class="contact-row__icon" aria-hidden="true">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92Z"/></svg>
  </div>
  <div>
    <div class="contact-row__label">Studio</div>
    <div class="contact-row__value"><a href="{{ c.phone_href }}">{{ c.phone }}</a></div>
  </div>
</div>
<div class="contact-row">
  <div class="contact-row__icon" aria-hidden="true">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="2" width="14" height="20" rx="3"/><circle cx="12" cy="18" r="1"/></svg>
  </div>
  <div>
    <div class="contact-row__label">Mobile</div>
    <div class="contact-row__value"><a href="{{ c.mobile_href }}">{{ c.mobile }}</a></div>
  </div>
</div>
<div class="contact-row">
  <div class="contact-row__icon" aria-hidden="true">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg>
  </div>
  <div>
    <div class="contact-row__label">Email</div>
    <div class="contact-row__value"><a href="mailto:{{ c.email }}">{{ c.email }}</a></div>
  </div>
</div>
<div class="contact-row">
  <div class="contact-row__icon" aria-hidden="true">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
  </div>
  <div>
    <div class="contact-row__label">Studio</div>
    <div class="contact-row__value">{{ c.address.line1 }}, {{ c.address.line2 }}, {{ c.address.city }} {{ c.address.postcode }}</div>
  </div>
</div>
