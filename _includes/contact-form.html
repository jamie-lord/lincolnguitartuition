{% assign c = site.data.contact %}
<form class="contact-form" action="https://formsubmit.co/{{ c.email }}" method="POST">
  <input type="hidden" name="_subject" value="New enquiry — Lincoln Guitar Tuition">
  <input type="hidden" name="_captcha" value="false">
  <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off">

  <div class="contact-form__row">
    <label class="field">
      <span class="field__label">Name</span>
      <input name="name" required placeholder="Your name" autocomplete="name">
    </label>
    <label class="field">
      <span class="field__label">Email</span>
      <input type="email" name="email" required placeholder="you@example.com" autocomplete="email">
    </label>
  </div>
  <label class="field">
    <span class="field__label">Looking to learn</span>
    <input name="topic" placeholder="e.g. jazz, blues, Grade 5 prep…">
  </label>
  <label class="field">
    <span class="field__label">Message</span>
    <textarea name="message" rows="5" required placeholder="Tell me a bit about where you're at and what you'd like to work on."></textarea>
  </label>
  <button type="submit" class="btn btn--primary btn--block">Send message</button>
</form>
