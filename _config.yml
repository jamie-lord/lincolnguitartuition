title: Lincoln Guitar Tuition
tagline: Tuition that opens up possibilities
description: >-
  Guitar tuition in central Lincoln with Dan McCaughern. Studio lessons,
  Skype lessons and session work. All styles, all levels — Rock, Jazz,
  Classical, Country, Folk and Funk.
url: "https://lincolnguitartuition.uk"
baseurl: ""

author:
  name: Dan McCaughern
  email: danguitarman@icloud.com

# Pages live at top-level slugs. Each page sets its own permalink to match
# the original WordPress URL.
permalink: /:slug/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: page

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed

# Keep the mirrored WordPress uploads — Jekyll would otherwise treat the
# directory as not-a-source and not copy it. (Belt and braces with `include`.)
keep_files:
  - wp-content

include:
  - wp-content
  - _redirects

# Social / SEO
social:
  name: Dan McCaughern
  links: []

logo: /assets/img/favicon.svg

# Build
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - README.md
  - lincolnguitartuition.WordPress.2026-04-26.xml
  - "ui_kits 2"
  - .DS_Store
  - scripts
  - dns
  - .github
