# FAQs — extracted from the WordPress page so they're easy to maintain.
- group: "Beginners advice"
  items:
    - q: "What kind of guitar should I buy?"
      a: |
        Buy either a cheap-ish classical (£50–100) or a reasonably cheap electric with amplifier and lead (£100–150). You might not take to the guitar like you thought, and you don't want to lay out a lot of money for a quick fad. Don't be too afraid to buy second-hand — electric guitars aren't too prone to going wrong electrically and are usually cheaply fixed.

        If you can, take along someone who knows what to look for. The necks of guitars can warp if they have been left next to radiators or — at the other temperature extreme — in the holds of aircraft.

        A guitar to **avoid** for beginners is the steel-strung acoustic, unless it has been professionally set up. Nasty on fingers.

        If the guitar is for a child (8–11 years) get a 3/4 size — unless they are big.

- group: "Getting started"
  items:
    - q: "How do I learn?"
      a: |
        During each lesson we make sure you've understood the tuition from previous weeks by referring to it at the start of the lesson. You're given tasks to perform that enhance your dexterity, musical understanding and creativity — usually short pieces of music emphasising a technique or theoretical element.

        We start simple. A few easy pieces to get your fingers going, then add more advanced elements as you progress. Within a few weeks you'll be playing songs you enjoy whilst developing understanding and techniques that will serve you for the rest of your life.

    - q: "How long should I practice?"
      a: |
        At first, about 10–15 minutes per day, three to four times per week. (If you can do more, great.)

        You're becoming a guitarist and you have certain "rites of passage" to go through to familiarise yourself with the instrument. At first it seems ungainly and awkward to hold and near-on impossible to move your fingers independently. (When else do you have to move your little finger up and your third finger down?)

        Don't give up. We've all been there, and I know it'll work for you if you just persist. The first few weeks are the most troublesome — but they're generally the weeks when the most progress is made; a good trade-off.
